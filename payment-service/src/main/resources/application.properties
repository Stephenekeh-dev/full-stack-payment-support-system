
#  Open Heaven Sanctuary
#  Payment Service
#
server.port=8080

#  Paystack
# Replace these with your real keys from https://dashboard.paystack.com/#/settings/developers
paystack.secret-key=${PAYSTACK_SECRET_KEY}
paystack.public-key=${PAYSTACK_PUBLIC_KEY}
paystack.base-url=https://api.paystack.co

# Callback / redirect after payment
# The URL Paystack redirects to after the user pays (used in redirect flow)
app.payment.callback-url=http://localhost:8080/api/payment/verify

# CORS allow your frontend origin
app.cors.allowed-origins=http://localhost:3000,http://localhost:63342, http://127.0.0.1:5500,https://yourdomain.com

# Database (H2 for dev; swap for MySQL/Postgres in prod)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.openheavensanctuary=DEBUG